[project]
name = "project-despina"
version = "0.1.0"
description = "Automated rural insurance claim validation using satellite imagery, weather station data, and soil analysis."
requires-python = ">=3.10"

dependencies = [
    # ── Web / API ──────────────────────────────────────────────────────────
    "requests>=2.31.0",

    # ── Data / Geo ─────────────────────────────────────────────────────────
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "geopandas>=0.14.0",
    "shapely>=2.0.0",
    "pyproj>=3.6.0",
    "fiona>=1.9.0",

    # ── Database ───────────────────────────────────────────────────────────
    "psycopg2-binary>=2.9.9",

    # ── Reports ────────────────────────────────────────────────────────────
    "python-docx>=1.1.0",
    "rich>=13.7.0",

    # ── Dashboard ──────────────────────────────────────────────────────────
    "streamlit>=1.35.0",
    "plotly>=5.20.0",
    "folium>=0.16.0",
    "streamlit-folium>=0.20.0",

    # ── STAC / Satellite (standalone mode) ─────────────────────────────────
    "pystac-client>=0.7.0",
    "rioxarray>=0.15.0",

    # ── Config ─────────────────────────────────────────────────────────────
    "python-dotenv>=1.0.0",
]

[project.scripts]
despina = "main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
# Tells uv to resolve/lock the full dependency graph on `uv sync`.
# Remove the line below if you want uv to also install the project itself
# as an editable package (useful when packaging for distribution).
package = false
